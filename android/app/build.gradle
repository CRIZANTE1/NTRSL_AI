apply plugin: 'com.android.application'

android {
    namespace = "com.ntrsl.ai"
    compileSdk = rootProject.ext.compileSdkVersion

    // ── Keystore de release ────────────────────────────────────────────────
    // Antes de gerar o AAB/APK de release:
    //   1. Crie o keystore: Build → Generate Signed Bundle/APK → Create new…
    //   2. Salve em android/keystore/ntrsl-release.jks (não commitar)
    //   3. Crie android/keystore.properties com as propriedades abaixo
    //
    // android/keystore.properties (NÃO commitar — já está no .gitignore):
    //   storeFile=../keystore/ntrsl-release.jks
    //   storePassword=SUA_SENHA_AQUI
    //   keyAlias=ntrsl-key
    //   keyPassword=SUA_SENHA_AQUI
    //
    def keystorePropsFile = rootProject.file("keystore.properties")
    def keystoreProps = new Properties()
    if (keystorePropsFile.exists()) {
        keystoreProps.load(new FileInputStream(keystorePropsFile))
    }

    signingConfigs {
        release {
            if (keystorePropsFile.exists()) {
                storeFile     file(keystoreProps['storeFile'])
                storePassword keystoreProps['storePassword']
                keyAlias      keystoreProps['keyAlias']
                keyPassword   keystoreProps['keyPassword']
            }
        }
    }

    defaultConfig {
        applicationId "com.ntrsl.ai"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // versionCode: incrementar a cada publicação no Play Store (nunca repetir)
        versionCode 2
        // versionName: alinhado com package.json "version"
        versionName "1.0.2"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            // Files and dirs to omit from the packaged assets dir.
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }
        release {
            // R8/minify ativo: reduz tamanho e ofusca o código Java/Kotlin
            minifyEnabled true
            // Shrink resources: remove assets e recursos não utilizados
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (keystorePropsFile.exists()) {
                signingConfig signingConfigs.release
            }
        }
    }

    bundle {
        // Configurações do Android App Bundle (AAB) — formato exigido pelo Play Store
        language { enableSplit = true }
        density  { enableSplit = true }
        abi      { enableSplit = true }
    }
}

repositories {
    google()
    mavenCentral()
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
